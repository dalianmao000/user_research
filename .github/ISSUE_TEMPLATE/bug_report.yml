name: Bug Report
description: Report a bug
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## Bug Description
        [Describe the bug clearly]

        ## Steps to Reproduce
        1.
        2.
        3.

        ## Expected Behavior
        [What you expected to happen]

        ## Actual Behavior
        [What actually happened]

        ## Environment
        - OS: [e.g., macOS M1]
        - Python version: [e.g., 3.11]

        ## Additional Context
        [Any other relevant information]
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true